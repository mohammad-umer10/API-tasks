<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>API-Task-05</title>
    </head>
    <body>
        
        <h2 onclick="full_details()">User Data</h2>
        <div id="output"></div>

        <script>
            function full_details(){
                fetch("https://jsonplaceholder.typicode.com/users/1")
                .then(res => res.json())
                .then(data => {
                    document.getElementById("output").innerHTML =
                        "Name: " + data.name + "<br>Email: " + data.email + "<br>Phone: " + data.phone + "<br>Website: " + data.website;
                })
                .catch(err => console.log(err));
            }
        </script>

    </body>
</html>
