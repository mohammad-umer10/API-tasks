<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>API-Task-02</title>
    </head>
    <body>

        <h2>Get My Location</h2>
        <button onclick="getLocation()">Get My Location</button>
        <div id="output"></div>

        <script>
            function getLocation() {
                const output = document.getElementById("output");

                output.innerHTML = "<p class='loading'>Getting location...</p>";

                if (!navigator.geolocation) {
                    output.innerHTML = "<p class='error'>Geolocation not supported</p>";
                    return;
                }

                navigator.geolocation.getCurrentPosition(
                    function (position) {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        output.innerHTML = `
                            <p><b>Latitude:</b> ${lat}</p>
                            <p><b>Longitude:</b> ${lon}</p>
                        `;
                    },

                    function (error) {
                        if (error.code === error.PERMISSION_DENIED) {
                            output.innerHTML = "<p class='error'>Access denied by user</p>";
                        } 
                    }
                );
            }
        </script>

    </body>
</html>
